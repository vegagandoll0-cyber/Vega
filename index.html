<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎂 Selamat Ulang Tahun Mildany Sayang 🎂</h1>
    

    <div class="envelope-wrapper">

        <!-- Surat -->
        <div class="letter">

            <div class="letter-content">

                <div class="text">
                    <p>
                        Selamat ulang tahun, istri tercinta. ❤️
                        Terima kasih sudah menjadi rumah ternyamanku. Semoga Allah selalu menjaga kesehatanmu dan mengabulkan setiap doa baikmu.🤍

                    </p>

                    <h2>I Love You ❤️</h2>
                </div>

                <div class="photo">
                    <img src="Cibun.jpeg" alt="">
                </div>

            </div>

        </div>

            <div class="hearts">
            <span>💗</span>
            <span>❤️</span>
            <span>💖</span>
            <span>❤️</span>
            <span>💗</span>
            </div>

        <!-- Belakang amplop -->
        <div class="envelope-back"></div>

        <!-- Depan amplop -->
        <div class="envelope-front"></div>

        <div class="seal">❤️</div>

        <!-- Tutup amplop -->
        <div class="envelope-flap"></div>

    </div>

    <div class="button-group">
        <button id="open">Buka</button>
        <button id="close">Tutup</button>
    </div>

</div>
<audio id="bgMusic">
    <source src="HBD.mp3" type="audio/mpeg">
</audio>
<script src="script.js"></script>

</body>
</html>
